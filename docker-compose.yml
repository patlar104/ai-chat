services:
  build:
    image: eclipse-temurin:21-jdk-jammy
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ~/.gradle:/root/.gradle          # reuse local Gradle cache — avoid re-downloading
      - /home/patri/Android/Sdk:/home/patri/Android/Sdk:ro  # mount existing SDK read-only
    environment:
      ANDROID_HOME: /home/patri/Android/Sdk
      JAVA_HOME: /opt/java/openjdk
      # Override gradle.properties local path so builds work inside the container
      GRADLE_OPTS: "-Dorg.gradle.java.home=/opt/java/openjdk"
    # Default: full build (mirrors CI)
    command: ./gradlew build

  # Quick targets — use with: docker compose run <service>
  ktlint:
    extends: build
    command: ./gradlew ktlintCheck

  ktlint-fix:
    extends: build
    command: ./gradlew ktlintFormat

  test:
    extends: build
    command: ./gradlew test

  detekt:
    extends: build
    command: ./gradlew detekt

  check-deps:
    extends: build
    command: bash .github/scripts/check-feature-deps.sh

  # Run the full CI pipeline locally (same steps as .github/workflows/ci.yml)
  ci:
    extends: build
    command: >
      sh -c "
        ./gradlew ktlintCheck &&
        ./gradlew detekt || true &&
        ./gradlew build &&
        ./gradlew test &&
        bash .github/scripts/check-feature-deps.sh
      "
