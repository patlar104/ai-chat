name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # This fixes the "Connection refused" errors in WSL/Docker
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Djava.net.preferIPv4Stack=true"
      _JAVA_OPTIONS: "-Djava.net.preferIPv4Stack=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # gradle.properties pins org.gradle.java.home to a local WSL path.
      # Override it here so the CI JDK is used instead.
      - name: Override Gradle Java home for CI
        run: sed -i "s|org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Check ktlint formatting
        run: ./gradlew ktlintCheck

      - name: Run Detekt static analysis
        run: ./gradlew detekt
        continue-on-error: true

      - name: Build all modules
        run: ./gradlew build

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Verify no feature-to-feature dependencies
        run: bash .github/scripts/check-feature-deps.sh
