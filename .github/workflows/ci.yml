name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # gradle.properties pins org.gradle.java.home to a local WSL path.
      # Override it here so the CI JDK is used instead.
      - name: Override Gradle Java home for CI
        run: echo "GRADLE_OPTS=-Dorg.gradle.java.home=$JAVA_HOME" >> $GITHUB_ENV

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check ktlint formatting
        run: ./gradlew ktlintCheck

      - name: Run Detekt static analysis
        run: ./gradlew detekt
        continue-on-error: true

      - name: Build all modules
        run: ./gradlew build

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Verify no feature-to-feature dependencies
        run: bash .github/scripts/check-feature-deps.sh
